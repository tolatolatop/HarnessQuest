[tool.ruff]
target-version = "py312"
line-length = 120
src = ["backend/app", "sdk/python/harnessquest_sdk"]

[tool.ruff.lint]
select = [
  "A",
  "ASYNC",
  "B",
  "BLE",
  "C4",
  "C90",
  "E",
  "F",
  "FAST",
  "I",
  "N",
  "PERF",
  "PIE",
  "PL",
  "PTH",
  "RET",
  "RUF",
  "SIM",
  "T20",
  "UP",
  "W",
]
ignore = [
  "A002",
  "B008",
  "FAST001",
  "FAST002",
  "PLR0913",
]

[tool.ruff.lint.per-file-ignores]
"backend/app/models.py" = ["F821"]
"backend/app/routes/*.py" = ["PLR0911"]

[tool.ruff.lint.isort]
known-first-party = ["app", "harnessquest_sdk"]

[tool.ruff.format]
quote-style = "double"
indent-style = "space"
line-ending = "lf"

[tool.mypy]
python_version = "3.12"
plugins = []
warn_unused_configs = true
warn_return_any = true
warn_unused_ignores = true
disallow_untyped_defs = true
disallow_incomplete_defs = true
no_implicit_optional = true
check_untyped_defs = true
namespace_packages = true
explicit_package_bases = true
mypy_path = ["backend", "sdk/python"]
exclude = ["frontend", "docs"]

[[tool.mypy.overrides]]
module = ["boto3.*", "botocore.*", "rq.*", "typer.*", "rich.*"]
ignore_missing_imports = true
